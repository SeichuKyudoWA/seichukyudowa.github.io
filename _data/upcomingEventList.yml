- year: 2026
  months:
    - month: (Recurring) Summer
      events:
        - title: Fire Mountain Monthly All-Day Outdoor Shooting
          location: Mount Vernon, WA
          dates: Always on a Saturday, consult Discord for exact dates.
          cost: $35 in advance for rental fees and drinks
          other_information:
            - text: Event lasts from 9am until 6pm.
            - text: Featuring a Kinteki (28m) taikai (tournament), Enteki (60m) shooting, and Kinteki (28m) free shooting.
            - text: Bring your own lunch and a snack to share. Optional group dinner afterward at local restaurant.
            - text: Regular Sunday practice will still take place on the following day.

    - month: August
      events:
        - title: IKYF North American Seminar + Shinsa (Canada)
          location: Richmond, BC, Canada
          dates: Monday August 17th - 19th, Shinsa on Thursday the 20th.
          cost: Seminar fees ~$640 (+$70 if testing). Food, travel & lodging costs are separate.
          other_information:
            - text: International Kyudo event, IKYF members attending from all around the world.
